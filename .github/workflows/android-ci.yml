name: Android CI (Kotlin)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: 'Sistema_Experto/*.gradle*'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: ./Sistema_Experto

      - name: Run tests
        run: ./gradlew test
        working-directory: ./Sistema_Experto

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: ./Sistema_Experto

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: Sistema_Experto/app/build/outputs/apk/debug/app-debug.apk
